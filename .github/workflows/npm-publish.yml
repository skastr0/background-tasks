name: Publish npm packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: release
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Use latest npm
        run: npm install -g npm@latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Verify
        run: bun run verify

      - name: Inspect package contents
        run: bun run pack:dry-run

      - name: Publish core
        run: npm publish "./packages/core" --access public

      - name: Publish CLI platform packages
        run: |
          npm publish "./packages/npm/background-tasks-darwin-arm64" --access public
          npm publish "./packages/npm/background-tasks-darwin-x64" --access public
          npm publish "./packages/npm/background-tasks-linux-arm64" --access public
          npm publish "./packages/npm/background-tasks-linux-x64" --access public

      - name: Publish CLI launcher
        run: npm publish "./packages/npm/background-tasks" --access public

      - name: Publish OpenCode integration
        run: npm publish "./apps/opencode" --access public
