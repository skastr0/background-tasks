name: Bug report
description: Report a reproducible bug.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please keep this focused on reproducible behavior.
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps or repository state needed to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, runtime versions, package manager, and relevant project details.
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Redact secrets and private data before posting.
      render: shell
